    <!-- Inline script: fetches live SEO settings from the server & updates meta tags.
         Runs synchronously before React loads so crawlers that execute JS see correct data.  -->
    <script>
      (function() {
        var BASE = (function() {
          var l = window.location;
          // Works for both dev (localhost:5173 → proxy to :3000) and production (same origin)
          return l.protocol + '//' + l.host;
        })();

        function setMeta(selector, attr, value) {
          var el = document.querySelector(selector);
          if (el && value) el.setAttribute(attr, value);
        }
        function setElText(id, value) {
          var el = document.getElementById(id);
          if (el && value) el.textContent = value;
        }

        function applySettings(s) {
          if (!s) return;
          // <title>
          if (s.seo_title) document.title = s.seo_title;
          // <meta name="description">
          setMeta('meta[name="description"]',    'content', s.seo_description);
          // <meta name="keywords">
          setMeta('meta[name="keywords"]',       'content', s.seo_keywords);
          // Open Graph
          setMeta('#seo-og-title',               'content', s.seo_title);
          setMeta('#seo-og-desc',                'content', s.seo_description);
          setMeta('#seo-og-url',                 'content', BASE);
          setMeta('#seo-og-image',               'content', s.seo_og_image || '');
          // Twitter
          setMeta('#seo-tw-title',               'content', s.seo_title);
          setMeta('#seo-tw-desc',                'content', s.seo_description);
          setMeta('#seo-tw-image',               'content', s.seo_og_image || '');
          // Canonical
          var can = document.getElementById('seo-canonical');
          if (can) can.setAttribute('href', BASE);
        }

        try {
          fetch(BASE + '/api/settings/system')
            .then(function(r) { return r.json(); })
            .then(function(data) { if (data && data.success) applySettings(data); })
            .catch(function() {});
        } catch(e) {}
      })();
    </script>
